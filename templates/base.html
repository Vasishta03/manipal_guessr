<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ManipalGeoGuessr{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <a href="{% url 'home' %}" class="nav-brand">
            <span class="brand-icon"></span>
            <span class="brand-text">ManipalGeoGuessr</span>
        </a>
        <div class="nav-links">
            <a href="{% url 'home' %}" class="nav-link">Home</a>
            <a href="{% url 'leaderboard' %}" class="nav-link">Leaderboard</a>
            <a href="{% url 'how_to_play' %}" class="nav-link">How to Play</a>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>ManipalGeoGuessr &mdash; Know your campus?</p>
    </footer>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
